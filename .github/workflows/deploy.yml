name: Build and Deploy PetStore API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: petstore-api
  ECS_CLUSTER: petstore-cluster
  ECS_SERVICE: api-service
  ECS_TASK_FAMILY: api-service
  TARGET_GROUP_NAME: petstore-api-tg
  CONTAINER_NAME: api
  CONTAINER_PORT: "5001"

jobs:
  build-and-deploy:
    name: Build, Push and Recreate ECS Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --label "org.opencontainers.image.revision=${{ github.sha }}" -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Resolve ECS deployment configuration
        id: ecs-config
        run: |
          TASK_DEFINITION=$(aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          TARGET_GROUP_ARN=$(aws elbv2 describe-target-groups \
            --names "$TARGET_GROUP_NAME" \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text)

          echo "task_definition=$TASK_DEFINITION" >> "$GITHUB_OUTPUT"
          echo "target_group_arn=$TARGET_GROUP_ARN" >> "$GITHUB_OUTPUT"

      - name: Delete existing ECS service
        run: |
          aws ecs delete-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force

          aws ecs wait services-inactive \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: Create new ECS service
        run: |
          aws ecs create-service \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_SERVICE" \
            --task-definition "${{ steps.ecs-config.outputs.task_definition }}" \
            --desired-count 1 \
            --launch-type EC2 \
            --load-balancers "targetGroupArn=${{ steps.ecs-config.outputs.target_group_arn }},containerName=$CONTAINER_NAME,containerPort=$CONTAINER_PORT" \
            --health-check-grace-period-seconds 60

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: Show ECS service status
        run: |
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].{Service:serviceName,Status:status,Desired:desiredCount,Running:runningCount,Pending:pendingCount,TaskDefinition:taskDefinition}' \
            --output table
